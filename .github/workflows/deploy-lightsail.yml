name: Deploy To Lightsail

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_REPOSITORY: ${{ secrets.DOCKERHUB_REPOSITORY }}
        run: |
          : "${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME is required}"
          : "${DOCKERHUB_REPOSITORY:?DOCKERHUB_REPOSITORY is required}"
          IMAGE_NAME="$(printf '%s/%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')"
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test -- --runInBand

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create production env file
        env:
          DATABASE_URL_PRODUCTION: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          {
            printf 'APP_ENV=production\n'
            printf 'DATABASE_URL_PRODUCTION=%s\n' "$DATABASE_URL_PRODUCTION"
          } > .env.production

      - name: Ensure deploy directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ secrets.LIGHTSAIL_PORT || '22' }}
          script_stop: true
          script: |
            sudo mkdir -p /opt/promise9
            sudo chown "$USER:$USER" /opt/promise9

      - name: Upload runtime files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ secrets.LIGHTSAIL_PORT || '22' }}
          source: docker-compose.prod.yml,.env.production
          target: /opt/promise9
          overwrite: true

      - name: Deploy container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USERNAME }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ secrets.LIGHTSAIL_PORT || '22' }}
          script_stop: true
          script: |
            cd /opt/promise9
            mv .env.production .env
            chmod 600 .env
            APP_IMAGE="${{ steps.image.outputs.name }}:${{ github.sha }}" docker compose -f docker-compose.prod.yml pull api
            APP_IMAGE="${{ steps.image.outputs.name }}:${{ github.sha }}" docker compose -f docker-compose.prod.yml up -d api
            docker image prune -af --filter "until=168h"
