services:
  api:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    container_name: promise9-api
    restart: unless-stopped
    env_file:
      - /opt/promise9/.env
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
